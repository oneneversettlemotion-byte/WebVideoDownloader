<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Logo 色系：黑 / 粉橙 / 蓝紫 */
      --bg:        #0D0D0F;
      --card:      rgba(255,255,255,.042);
      --card-b:    rgba(255,255,255,.08);
      --input-bg:  rgba(255,255,255,.055);
      --input-b:   rgba(255,255,255,.09);
      --input-bf:  rgba(239,115,80,.65);
      --text:      #F5F0FF;
      --text2:     rgba(255,255,255,.42);
      --text3:     rgba(255,255,255,.20);
      /* 渐变：粉红→橙→蓝紫（logo 色） */
      --g1: #F04E7B;   /* 品红 */
      --g2: #F4823A;   /* 橙 */
      --g3: #6B5EF8;   /* 蓝紫 */
      --prog-bg:   rgba(255,255,255,.07);
      --log-bg:    rgba(0,0,0,.30);
      --log-b:     rgba(255,255,255,.055);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; overflow: hidden;
    }

    /* 背景光晕，提取 logo 三色 */
    .glow { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(90px); opacity: .38; }
    .glow-a { width: 500px; height: 500px; top: -180px; right: -140px;
               background: radial-gradient(circle, rgba(244,130,58,.7), transparent 70%); }
    .glow-b { width: 420px; height: 420px; bottom: -140px; left: -110px;
               background: radial-gradient(circle, rgba(107,94,248,.65), transparent 70%); }
    .glow-c { width: 300px; height: 300px; top: 35%; left: 20%;
               background: radial-gradient(circle, rgba(240,78,123,.4), transparent 70%); }

    /* 主卡片 */
    .card {
      width: 620px;
      background: var(--card);
      border: 1px solid var(--card-b);
      border-radius: 28px;
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      padding: 36px 40px 34px;
      position: relative; z-index: 1;
    }

    /* 头部 */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .header-left { display: flex; align-items: center; gap: 16px; }

    /* Logo 图标 */
    .logo-wrap {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a1a2a 100%);
      border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 13px; }

    .header h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -.5px; line-height: 1.2;
      background: linear-gradient(120deg, #fff 0%, #f4823a 45%, #f04e7b 75%, #6b5ef8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { margin-top: 4px; font-size: 12px; color: var(--text2); }

    /* 状态徽章 */
    .badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(244,130,58,.12); border: 1px solid rgba(244,130,58,.3);
      border-radius: 99px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; color: #fbbf8a; white-space: nowrap; flex-shrink: 0;
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #f4823a; box-shadow: 0 0 7px #f4823a; flex-shrink: 0; }
    .badge.busy { background: rgba(240,78,123,.13); border-color: rgba(240,78,123,.32); color: #fdb0c8; }
    .badge.busy .dot { background: #f04e7b; box-shadow: 0 0 7px #f04e7b; }
    .badge.done { background: rgba(52,211,153,.11); border-color: rgba(52,211,153,.28); color: #6ee7b7; }
    .badge.done .dot { background: #34d399; box-shadow: 0 0 7px #34d399; }
    .badge.err  { background: rgba(239,68,68,.11); border-color: rgba(239,68,68,.28); color: #fca5a5; }
    .badge.err  .dot { background: #f87171; box-shadow: 0 0 7px #f87171; }

    /* 区块标签 */
    .field-label {
      font-size: 11px; font-weight: 600; color: var(--text3);
      letter-spacing: .9px; text-transform: uppercase; margin-bottom: 9px;
    }

    /* URL 输入框 */
    .input-wrap {
      display: flex; align-items: center;
      background: var(--input-bg); border: 1px solid var(--input-b);
      border-radius: 14px; padding: 0 16px; margin-bottom: 18px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within { border-color: var(--input-bf); box-shadow: 0 0 0 3px rgba(244,130,58,.14); }
    .input-wrap .ico { font-size: 15px; opacity: .32; margin-right: 10px; flex-shrink: 0; }
    .input-wrap input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 14px; color: var(--text); padding: 14px 0; font-family: inherit;
    }
    .input-wrap input::placeholder { color: var(--text3); }
    .clear { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 4px 2px; line-height: 1; transition: color .15s; }
    .clear:hover { color: rgba(255,255,255,.55); }

    /* 设置行 */
    .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 20px; }
    .setting-block {
      background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; padding: 12px 15px; transition: border-color .18s, background .18s;
    }
    .setting-block:hover { border-color: rgba(255,255,255,.14); background: rgba(255,255,255,.06); }
    .setting-block .s-label { font-size: 10.5px; color: var(--text3); font-weight: 600; letter-spacing: .7px; text-transform: uppercase; margin-bottom: 5px; }
    .setting-block .s-row { display: flex; align-items: center; justify-content: space-between; }
    .setting-block .s-val { font-size: 13px; color: rgba(255,255,255,.78); font-weight: 500; }
    .s-edit { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: inherit; padding: 2px 6px; border-radius: 6px; transition: background .15s, color .15s; }
    .s-edit:hover { background: rgba(255,255,255,.07); color: #fbbf8a; }
    .dir-input { margin-top: 6px; background: rgba(0,0,0,.3); border: 1px solid rgba(244,130,58,.35); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--text); font-family: "Menlo", monospace; width: 100%; outline: none; display: none; }
    .dir-input.show { display: block; }
    .btn-browse {
      font-size: 11px; color: #fbbf8a; background: rgba(244,130,58,.13);
      border: 1px solid rgba(244,130,58,.3); cursor: pointer; font-family: inherit;
      padding: 3px 9px; border-radius: 6px; transition: background .15s, border-color .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-browse:hover { background: rgba(244,130,58,.24); border-color: rgba(244,130,58,.55); }
    .btn-browse:disabled { opacity: .35; cursor: not-allowed; }

    /* 进度卡片 */
    .progress-card {
      background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.065);
      border-radius: 15px; padding: 16px 18px 14px; margin-bottom: 14px;
    }
    .prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 11px; }
    .prog-status { font-size: 13px; color: var(--text2); }
    .prog-pct { font-size: 13px; font-weight: 700; color: #f4823a; }
    .prog-bar-bg { height: 5px; background: var(--prog-bg); border-radius: 99px; overflow: hidden; margin-bottom: 13px; }
    .prog-bar-fill {
      height: 100%; width: 0%; border-radius: 99px;
      background: linear-gradient(90deg, var(--g1), var(--g2) 50%, var(--g3));
      transition: width .35s ease;
    }
    .prog-meta { display: flex; gap: 20px; }
    .meta-item { font-size: 12px; color: var(--text3); }
    .meta-item strong { color: rgba(255,255,255,.52); font-weight: 600; }

    /* 日志 */
    .log-box {
      background: var(--log-bg); border: 1px solid var(--log-b);
      border-radius: 11px; padding: 10px 13px;
      font-family: "Menlo", "SF Mono", monospace; font-size: 11px;
      color: var(--text3); line-height: 1.75; max-height: 84px;
      overflow-y: auto; margin-bottom: 22px;
    }
    .log-box::-webkit-scrollbar { width: 3px; }
    .log-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
    .l-info { color: rgba(244,130,58,.8); }
    .l-ok   { color: rgba(52,211,153,.78); }
    .l-warn { color: rgba(251,191,36,.75); }
    .l-err  { color: rgba(248,113,113,.82); }

    /* 按钮 */
    .btn-row { display: flex; gap: 10px; align-items: center; }
    .btn-primary {
      flex: 1; padding: 13px 0; border-radius: 13px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; font-family: inherit; letter-spacing: -.1px;
      /* logo 三色渐变 */
      background: linear-gradient(130deg, #F04E7B 0%, #F4823A 50%, #6B5EF8 100%);
      color: #fff; position: relative; overflow: hidden;
      transition: opacity .18s, transform .14s, box-shadow .18s;
      box-shadow: 0 4px 22px rgba(244,130,58,.32);
    }
    .btn-primary::after { content: ""; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background .15s; }
    .btn-primary:hover::after { background: rgba(255,255,255,.08); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 7px 28px rgba(244,130,58,.44); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-icon {
      width: 46px; height: 46px; border-radius: 11px;
      border: 1px solid rgba(255,255,255,.09); background: rgba(255,255,255,.045);
      cursor: pointer; font-size: 16px; color: rgba(255,255,255,.38);
      display: flex; align-items: center; justify-content: center;
      transition: background .18s, border-color .18s, color .18s; flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.18); color: rgba(255,255,255,.82); }
    .btn-icon:disabled { opacity: .28; cursor: not-allowed; }
    .btn-icon.danger:hover { background: rgba(240,78,123,.18); border-color: rgba(240,78,123,.35); color: #fdb0c8; }

    /* 分割线 */
    .divider { height: 1px; background: rgba(255,255,255,.055); margin: 0 0 18px; }

    /* 更新提示 */
    .update-tip {
      font-size: 11px; padding: 4px 10px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04);
      color: var(--text3); cursor: default; white-space: nowrap; transition: all .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .update-tip.updating { color: #fbbf8a; border-color: rgba(244,130,58,.3); background: rgba(244,130,58,.08); }
    .update-tip.done     { color: #6ee7b7; border-color: rgba(52,211,153,.28); background: rgba(52,211,153,.07); }
    .update-tip.error    { color: #fca5a5; border-color: rgba(239,68,68,.28);  background: rgba(239,68,68,.07); }
    .update-tip .spin    { display:inline-block; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .update-tip button { background:none; border:none; cursor:pointer; font-size:10px; color:inherit; padding:0 2px; font-family:inherit; opacity:.7; }
    .update-tip button:hover { opacity:1; }

    /* 平台标签 */
    .platforms { margin-top: 18px; display: flex; gap: 6px; flex-wrap: wrap; }
    .pt { font-size: 11px; color: var(--text3); background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.065); border-radius: 99px; padding: 3px 10px; }
  </style>
</head>
<body>

<div class="glow glow-a"></div>
<div class="glow glow-b"></div>
<div class="glow glow-c"></div>

<div class="card">

  <!-- 头部 -->
  <div class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <img id="logo-img" src="" alt="D" />
      </div>
      <div>
        <h1>Video Downloader</h1>
        <p>下载任意网页视频，保留最高清晰度与完整音频</p>
      </div>
    </div>
    <div class="badge" id="badge">
      <span class="dot"></span>
      <span id="badge-text">就绪</span>
    </div>
  </div>

  <!-- yt-dlp 更新状态（在 header 下方，分割线上方） -->
  <div style="display:flex;justify-content:flex-end;margin:-16px 0 14px;">
    <div class="update-tip" id="update-tip" title="yt-dlp 版本状态">
      <span id="update-icon">🔄</span>
      <span id="update-msg">检查更新中…</span>
      <button id="update-btn" title="手动更新">↻</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- URL 输入 -->
  <div class="field-label">视频链接</div>
  <div class="input-wrap">
    <span class="ico">🔗</span>
    <input id="url-input" type="text"
           placeholder="粘贴视频链接……YouTube、Bilibili、站酷、抖音、小红书均可"
           autocomplete="off" spellcheck="false" />
    <button class="clear" id="clear-btn">✕</button>
  </div>

  <!-- 设置 -->
  <div class="settings-row">
    <div class="setting-block">
      <div class="s-label">画质</div>
      <div class="s-row">
        <span class="s-val">最高画质</span>
        <span style="font-size:11px;color:rgba(255,255,255,.2);">自动</span>
      </div>
    </div>
    <div class="setting-block">
      <div class="s-label">保存位置</div>
      <div class="s-row">
        <span class="s-val" id="dir-display" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;" title="~/Downloads">~/Downloads</span>
        <button class="btn-browse" id="browse-btn">📂 浏览…</button>
      </div>
    </div>
  </div>

  <!-- 进度 -->
  <div class="progress-card">
    <div class="prog-header">
      <span class="prog-status" id="status-text">准备就绪</span>
      <span class="prog-pct" id="pct-text"></span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill"></div></div>
    <div class="prog-meta">
      <div class="meta-item">速度 <strong id="m-speed">—</strong></div>
      <div class="meta-item">剩余 <strong id="m-eta">—</strong></div>
      <div class="meta-item">大小 <strong id="m-size">—</strong></div>
    </div>
  </div>

  <!-- 日志 -->
  <div class="log-box" id="log-box">
    <span style="color:rgba(255,255,255,.13);">等待下载…</span>
  </div>

  <!-- 按钮 -->
  <div class="btn-row">
    <button class="btn-primary" id="dl-btn">⬇&ensp;开始下载</button>
    <button class="btn-icon danger" id="stop-btn" title="停止" disabled>⏹</button>
    <button class="btn-icon" id="open-btn" title="打开文件夹">📂</button>
  </div>

  <!-- 平台标签 -->
  <div class="platforms">
    <span class="pt">YouTube</span><span class="pt">Bilibili</span>
    <span class="pt">站酷</span><span class="pt">抖音</span><span class="pt">小红书</span>
    <span class="pt">Vimeo</span><span class="pt">Behance</span>
    <span class="pt">Twitter / X</span><span class="pt">TikTok</span>
    <span class="pt">Instagram</span><span class="pt">1000+ 站点</span>
  </div>

</div>

<script>
  /* 加载 logo（App 内置） */
  const logoImg = document.getElementById("logo-img");
  fetch("/logo").then(r => r.blob()).then(b => {
    logoImg.src = URL.createObjectURL(b);
  }).catch(() => { logoImg.style.display = "none"; });

  const urlInput  = document.getElementById("url-input");
  const clearBtn  = document.getElementById("clear-btn");
  const dirDisplay= document.getElementById("dir-display");
  const browseBtn = document.getElementById("browse-btn");
  const dlBtn     = document.getElementById("dl-btn");

  // ── yt-dlp 更新状态
  const updateTip  = document.getElementById("update-tip");
  const updateIcon = document.getElementById("update-icon");
  const updateMsg  = document.getElementById("update-msg");
  const updateBtn  = document.getElementById("update-btn");

  let updatePollTimer = null;

  function applyUpdateStatus(s) {
    updateTip.className = "update-tip " + (s.state === "idle" ? "" : s.state);
    if (s.state === "updating") {
      updateIcon.innerHTML = '<span class="spin">↻</span>';
      updateMsg.textContent = s.msg || "正在更新…";
    } else if (s.state === "done") {
      updateIcon.textContent = "✅";
      updateMsg.textContent = s.msg || "已是最新";
      clearTimeout(updatePollTimer);
      // 30s 后淡出变回默认
      updatePollTimer = setTimeout(() => {
        updateTip.className = "update-tip";
        updateIcon.textContent = "🔄";
        updateMsg.textContent = "yt-dlp 已最新";
      }, 30000);
    } else if (s.state === "error") {
      updateIcon.textContent = "⚠️";
      updateMsg.textContent = s.msg || "更新失败";
      clearTimeout(updatePollTimer);
    }
  }

  function pollUpdateStatus() {
    fetch("/ytdlp-status").then(r => r.json()).then(s => {
      applyUpdateStatus(s);
      if (s.state === "updating") {
        updatePollTimer = setTimeout(pollUpdateStatus, 2000);
      }
    }).catch(() => {});
  }

  // 启动时拉一次状态（App 后台已经开始更新了）
  pollUpdateStatus();
  // 3s 后再拉一次（等后台更新开始）
  setTimeout(pollUpdateStatus, 3000);

  updateBtn.addEventListener("click", () => {
    fetch("/ytdlp-update", { method: "POST" }).then(r => r.json()).then(s => {
      applyUpdateStatus(s.status || s);
      if ((s.status || s).state === "updating") {
        updatePollTimer = setTimeout(pollUpdateStatus, 2000);
      }
    });
  });
  const stopBtn   = document.getElementById("stop-btn");
  const openBtn   = document.getElementById("open-btn");
  const badge     = document.getElementById("badge");
  const badgeText = document.getElementById("badge-text");
  const statusTxt = document.getElementById("status-text");
  const pctTxt    = document.getElementById("pct-text");
  const progFill  = document.getElementById("prog-fill");
  const logBox    = document.getElementById("log-box");
  const mSpeed    = document.getElementById("m-speed");
  const mEta      = document.getElementById("m-eta");
  const mSize     = document.getElementById("m-size");

  let saveDir    = "~/Downloads";
  let currentSid = null;
  let sse        = null;
  let downloading= false;

  browseBtn.addEventListener("click", async () => {
    browseBtn.disabled = true;
    try {
      const resp = await fetch("/pick-folder", { method: "POST" });
      const data = await resp.json();
      if (data.ok && data.path) {
        saveDir = data.path;
        dirDisplay.textContent = data.path;
        dirDisplay.title = data.path;
      }
    } catch(e) {
      // 若 pywebview 不可用（浏览器调试模式），静默忽略
    } finally {
      browseBtn.disabled = false;
    }
  });
  clearBtn.addEventListener("click", () => { urlInput.value = ""; urlInput.focus(); });
  urlInput.addEventListener("keydown", e => { if (e.key === "Enter") startDownload(); });
  dlBtn.addEventListener("click", startDownload);
  stopBtn.addEventListener("click", stopDownload);
  openBtn.addEventListener("click", () => {
    fetch("/open-folder", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ folder: saveDir }) });
  });

  function setBadge(cls, text) { badge.className = "badge " + cls; badgeText.textContent = text; }
  function setStatus(text)     { statusTxt.textContent = text; }
  function setPct(pct) {
    pctTxt.textContent = pct != null ? pct.toFixed(0) + "%" : "";
    progFill.style.width = pct != null ? pct + "%" : "0%";
  }
  function addLog(text, cls) {
    const s = document.createElement("span"); s.style.display = "block";
    if (cls) s.className = cls; s.textContent = text;
    logBox.appendChild(s); logBox.scrollTop = logBox.scrollHeight;
  }
  function clearLog()  { logBox.innerHTML = ""; }
  function resetMeta() { mSpeed.textContent = mEta.textContent = mSize.textContent = "—"; }
  function resetButtons() {
    downloading = false; currentSid = null;
    dlBtn.disabled = false; stopBtn.disabled = true;
    if (sse) { sse.close(); sse = null; }
  }

  async function startDownload() {
    const url = urlInput.value.trim();
    if (!url || downloading) return;
    clearLog(); resetMeta(); setPct(0);
    setStatus("正在连接…"); setBadge("busy", "下载中");
    dlBtn.disabled = true; stopBtn.disabled = false; downloading = true;

    let sid;
    try {
      const resp = await fetch("/start", { method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ url, save_dir: saveDir }) });
      const data = await resp.json();
      if (!data.ok) { setStatus("❌ "+data.error); setBadge("err","出错"); addLog("❌ "+data.error,"l-err"); resetButtons(); return; }
      sid = data.sid; currentSid = sid;
    } catch(e) { setStatus("❌ 无法连接到服务"); setBadge("err","出错"); addLog("❌ 启动失败: "+e,"l-err"); resetButtons(); return; }

    setStatus("正在解析视频信息…"); addLog("[系统] 开始下载","l-info");
    sse = new EventSource(`/progress/${sid}`);
    sse.onmessage = (e) => {
      let msg; try { msg = JSON.parse(e.data); } catch { return; }
      switch(msg.type) {
        case "progress":
          setStatus(`下载中  ${msg.speed||""}`); setPct(msg.pct);
          if(msg.speed) mSpeed.textContent=msg.speed;
          if(msg.eta)   mEta.textContent=msg.eta;
          if(msg.size)  mSize.textContent=msg.size;
          addLog(msg.line); break;
        case "merging": setStatus("正在合并音视频…"); setPct(99); addLog("[合并] 正在合并…","l-info"); break;
        case "audio":   setStatus("正在提取音频…"); addLog("[音频] 提取音频…","l-info"); break;
        case "log":
          if(msg.line.includes("WARNING")) addLog(msg.line,"l-warn");
          else if(msg.line.includes("ERROR")) addLog(msg.line,"l-err");
          else if(msg.line.match(/\[(youtube|bilibili|vimeo)\]/)) addLog(msg.line,"l-info");
          else addLog(msg.line); break;
        case "done":    setPct(100); setStatus("✅ 下载完成！"); setBadge("done","完成"); addLog("✅ 下载完成","l-ok"); resetButtons(); break;
        case "stopped": setStatus("已停止"); setBadge("","就绪"); addLog("⏹ 已停止","l-warn"); resetButtons(); break;
        case "error":   setStatus("❌ "+msg.msg); setBadge("err","出错"); addLog("❌ "+msg.msg,"l-err"); resetButtons(); break;
      }
    };
    sse.onerror = () => { if(!downloading) return; setStatus("❌ 进度流中断"); setBadge("err","出错"); addLog("❌ SSE 中断","l-err"); resetButtons(); };
  }

  async function stopDownload() {
    if(!currentSid) return;
    await fetch("/stop", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ sid: currentSid }) });
  }
</script>
