name: Build Windows EXE

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'         # 打 tag 时自动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-sock pywebview pyinstaller
          pip install yt-dlp

      # 4. 下载 Windows 版 ffmpeg
      - name: Download ffmpeg for Windows
        run: |
          curl -L "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          tar -xf ffmpeg.zip
          copy "ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" "ffmpeg.exe"
          del ffmpeg.zip
          rmdir /s /q "ffmpeg-master-latest-win64-gpl"
        shell: cmd

      # 5. 下载 Windows 版 yt-dlp
      - name: Download yt-dlp for Windows
        run: |
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o yt-dlp.exe
        shell: cmd

      # 6. 生成 Windows 图标（将 logo.jpg 转为 .ico）
      - name: Generate Windows icon
        run: |
          python -c "
          from PIL import Image
          import sys
          try:
            img = Image.open('logo.jpg').convert('RGBA')
            sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
            img.save('AppIcon.ico', format='ICO', sizes=sizes)
            print('Icon generated successfully')
          except Exception as e:
            print(f'Icon generation failed: {e}, using default')
            # 创建一个简单的默认图标
            img = Image.new('RGBA', (256,256), (100,100,200,255))
            img.save('AppIcon.ico', format='ICO')
          "
          pip install pillow

      # 7. 重新生成图标（确保 pillow 安装后再运行）
      - name: Generate icon with pillow
        run: |
          pip install pillow
          python -c "
          from PIL import Image
          img = Image.open('logo.jpg').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save('AppIcon.ico', format='ICO', sizes=sizes)
          print('AppIcon.ico created')
          "

      # 8. PyInstaller 打包
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean `
            --name "VideoDownloader" `
            --windowed `
            --icon "AppIcon.ico" `
            --add-data "static;static" `
            --add-data "logo.jpg;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "yt-dlp.exe;." `
            --hidden-import flask `
            --hidden-import pkg_resources `
            --hidden-import webview `
            --hidden-import webview.platforms.winforms `
            main.py
        shell: pwsh

      # 9. 打包成 zip
      - name: Zip the dist folder
        run: |
          cd dist
          powershell Compress-Archive -Path "VideoDownloader" -DestinationPath "..\VideoDownloader-Windows.zip"
        shell: cmd

      # 10. 上传 artifact（供下载）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Windows
          path: VideoDownloader-Windows.zip
          retention-days: 30

      # 11. 如果是 tag 触发，自动上传到 Release
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VideoDownloader-Windows.zip
          token: ${{ secrets.GITHUB_TOKEN }}
