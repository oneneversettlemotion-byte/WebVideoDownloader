name: Build Windows EXE

on:
  workflow_dispatch:  # 手动触发

permissions:
  contents: write    # 允许上传到 Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-sock pywebview pyinstaller pillow yt-dlp

      # 4. 下载 Windows 版 ffmpeg
      - name: Download ffmpeg for Windows
        run: |
          curl -L "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          tar -xf ffmpeg.zip
          copy "ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" "ffmpeg.exe"
          del ffmpeg.zip
          rmdir /s /q "ffmpeg-master-latest-win64-gpl"
        shell: cmd

      # 5. 下载 Windows 版 yt-dlp
      - name: Download yt-dlp for Windows
        run: |
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o yt-dlp.exe
        shell: cmd

      # 6. 生成 Windows .ico 图标
      - name: Generate Windows icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.jpg').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save('AppIcon.ico', format='ICO', sizes=sizes)
          print('AppIcon.ico created')
          "

      # 7. PyInstaller 打包
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean `
            --name "VideoDownloader" `
            --windowed `
            --icon "AppIcon.ico" `
            --add-data "static;static" `
            --add-data "logo.jpg;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "yt-dlp.exe;." `
            --hidden-import flask `
            --hidden-import pkg_resources `
            --hidden-import webview `
            --hidden-import webview.platforms.winforms `
            main.py
        shell: pwsh

      # 8. 打包成 zip
      - name: Zip the dist folder
        run: Compress-Archive -Path "dist\VideoDownloader" -DestinationPath "VideoDownloader-Windows.zip"
        shell: pwsh

      # 9. 上传到 v1.0.0 Release（与 Mac DMG 放在一起）
      - name: Upload Windows zip to v1.0.0 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0          # 指定上传到已有的 v1.0.0
          files: VideoDownloader-Windows.zip
          token: ${{ secrets.GITHUB_TOKEN }}
